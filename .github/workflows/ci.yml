name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Build and check
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Check core behavior
        run: swift run CleanUpBodyCoreChecks
